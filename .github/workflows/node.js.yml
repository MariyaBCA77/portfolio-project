name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use Node 18 (stable)
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Move to backend folder
      - name: Go to backend folder
        run: cd backend

      # Install dependencies only
      - name: Install dependencies
        run: npm install

      # Optional: Build & Test (commented out to prevent failure)
      # - run: npm run build --if-present
      # - run: npm test
